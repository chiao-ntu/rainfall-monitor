name: QPESUMS 每小時累積

on:
  schedule:
    - cron: '12 * * * *'   # 每小時第12分（錯開主排程，避免同時 push）
  workflow_dispatch:

concurrency:
  group: update-qpesums
  cancel-in-progress: false

jobs:
  accumulate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch_qpesums_hourly.py
        env:
          CWA_API_KEY: ${{ secrets.CWA_API_KEY }}
        run: python fetch_qpesums_hourly.py

      - name: Commit and push
        run: |
          if [ ! -f qpesums_history.json ]; then
            echo "本次未產生 qpesums_history.json（抓取失敗或無資料），跳過 commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add qpesums_history.json
          git diff --staged --quiet || git commit -m "QPESUMS：$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M') TST [skip ci]"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push
