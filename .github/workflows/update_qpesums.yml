name: QPESUMS 每小時累積

on:
  schedule:
    - cron: '12 * * * *'   # 每小時第12分（錯開主排程，避免同時 push）
  workflow_dispatch:

concurrency:
  group: update-qpesums
  cancel-in-progress: false

jobs:
  accumulate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # fetch_qpesums_hourly.py 只用 requests + 標準庫（解析文字型網格，
      # 不讀圖檔），故不需 pillow/numpy。
      - name: Install dependencies
        run: pip install requests

      - name: Run fetch_qpesums_hourly.py
        env:
          CWA_API_KEY: ${{ secrets.CWA_API_KEY }}
        run: python fetch_qpesums_hourly.py

      # qpesums_history.json 同為機器全量重算產物：衝突一律以我方為準並重試，
      # 避免與主 workflow 同時 push 時卡在 detached HEAD（與 rainfall workflow 同策略）。
      - name: Commit and push
        run: |
          set -e
          if [ ! -f qpesums_history.json ]; then
            echo "本次未產生 qpesums_history.json（抓取失敗或無資料），跳過 commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${{ github.ref_name }}"

          git add qpesums_history.json
          if git diff --staged --quiet; then
            echo "無變更，跳過"
            exit 0
          fi
          git commit -m "QPESUMS：$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M') TST [skip ci]"

          for i in 1 2 3 4 5; do
            if git push origin HEAD:"$BRANCH"; then
              echo "push 成功（第 $i 次嘗試）"
              exit 0
            fi
            echo "push 失敗，拉遠端後以我方資料為準重試（第 $i 次）..."
            git fetch origin "$BRANCH"
            if ! git rebase -X ours "origin/$BRANCH"; then
              git rebase --abort || true
              git merge -X ours --no-edit "origin/$BRANCH" || true
            fi
          done

          echo "重試 5 次仍失敗" >&2
          exit 1
