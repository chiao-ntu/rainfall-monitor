name: 自動更新降雨資料

on:
  schedule:
    # 每6小時執行一次（UTC時間）
    # 台灣時間 05/11/17/23 時 對應 UTC 21/03/09/15 時（前一天）
    - cron: '0 21 * * *'   # 台灣 05:00
    - cron: '0 3  * * *'   # 台灣 11:00
    - cron: '0 9  * * *'   # 台灣 17:00
    - cron: '0 15 * * *'   # 台灣 23:00
  workflow_dispatch:         # 允許手動觸發

# 防止兩次執行重疊（前一次還沒跑完時，後一次排隊等待）
concurrency:
  group: update-rainfall
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # 1. 取得 repository 內容
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安裝 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. 安裝套件
      #    pillow + numpy 為 CWA 定量降水預報圖（PNG）色塊判讀所需
      #    （單應性座標轉換用 numpy，讀取像素用 Pillow）。缺任一者 PNG 判讀會被跳過。
      - name: Install dependencies
        run: pip install requests pillow numpy

      # 4. 執行抓取腳本（API Key 從 Secrets 注入）
      - name: Run fetch_rainfall.py
        env:
          CWA_API_KEY: ${{ secrets.CWA_API_KEY }}
        run: python fetch_rainfall.py

      # 5. 把 data.json、obs_history.json、archive/ 快照推回 GitHub
      #    這些是「機器每次全量重算」的產物檔：遇到與遠端衝突時，
      #    我方剛算出的就是最新版 → 一律以我方為準（-X ours），並重試數次
      #    以吸收與 QPESUMS workflow 同時 push 的競態。絕不留在 detached HEAD。
      - name: Commit and push data
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${{ github.ref_name }}"

          git add data.json obs_history.json archive/
          if git diff --staged --quiet; then
            echo "無變更，跳過"
            exit 0
          fi
          git commit -m "自動更新：$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M') TST [skip ci]"

          # 最多重試 5 次：每次先把遠端拉進來（衝突以我方產物為準），再 push
          for i in 1 2 3 4 5; do
            if git push origin HEAD:"$BRANCH"; then
              echo "push 成功（第 $i 次嘗試）"
              exit 0
            fi
            echo "push 失敗，拉遠端後以我方資料為準重試（第 $i 次）..."
            git fetch origin "$BRANCH"
            # -X ours：合併衝突時保留我方（剛算出的最新資料）。
            # rebase 失敗則 abort 改用 merge，確保不卡在 detached HEAD。
            if ! git rebase -X ours "origin/$BRANCH"; then
              git rebase --abort || true
              git merge -X ours --no-edit "origin/$BRANCH" || true
            fi
          done

          echo "重試 5 次仍失敗" >&2
          exit 1
