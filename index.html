<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>台灣降雨預測監測系統</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft JhengHei',sans-serif;background:#0c1822;color:#dde8f2;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#hdr{background:#091520;border-bottom:1px solid #1a3348;padding:6px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
#hdr h1{font-size:14px;font-weight:700;color:#6bc8e8}
#hdr .sub{font-size:10px;color:#3a6080}
.tag{border-radius:3px;padding:2px 7px;font-size:10px;border:1px solid}
.tag.agency{background:#0e2a42;border-color:#1e5070;color:#6bc8e8}
.tag.sim{background:#1a2a0a;border-color:#3a6010;color:#8ad040}
.tag.live{background:#0a2a0a;border-color:#2a7a2a;color:#4ae44a}
.tag.paused{background:#2a1a0a;border-color:#7a4a0a;color:#e4a44a}
.tag.time{background:#1a1a2a;border-color:#3a3a6a;color:#9090d0}
#ctrl{background:#081420;border-bottom:1px solid #1a3348;padding:5px 14px;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.ctrl-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cl{font-size:10px;color:#3a6080;white-space:nowrap}
.bg{display:flex;gap:2px;flex-wrap:wrap}
.b{padding:3px 9px;font-size:10px;border:1px solid #1e3a5a;background:#0d2035;color:#5a90b8;cursor:pointer;border-radius:3px;transition:all .12s;white-space:nowrap}
.b:hover{background:#1a3a5a}
.b.on{background:#14507a;border-color:#3a8acc;color:#6bc8e8;font-weight:700}
.b.pbtn{border-color:#5a4010;color:#c08030}
.b.pbtn.on{background:#3a2a0a;border-color:#aa6010;color:#f0a030}
#cust-ctrl{display:none;align-items:center;gap:8px;flex-wrap:wrap;padding:2px 0}
#cust-ctrl.show{display:flex}
.sl-wrap{display:flex;align-items:center;gap:4px}
.sl-wrap label{font-size:10px;color:#5a8aaa;white-space:nowrap}
input[type=range]{-webkit-appearance:none;width:110px;height:4px;border-radius:2px;background:#1a3a5a;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:#3a9adf;cursor:pointer}
#rng-disp{font-size:10px;color:#8ac8e8;font-weight:700;min-width:150px}
#main{display:flex;flex:1;overflow:hidden}
#map{flex:1}
/* 純白底 */
.leaflet-container{background:#ffffff!important}
#sb{width:270px;background:#091520;border-left:1px solid #1a3348;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#ip{padding:10px;border-bottom:1px solid #1a3348;flex-shrink:0}
#ip h3{font-size:12px;color:#6bc8e8;margin-bottom:5px}
.hint{font-size:10px;color:#2a5070}
.ir{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #0d2030;font-size:10px}
.ir .l{color:#3a7090}.ir .v{font-weight:700;color:#b0cce0}
.v.ok{color:#50d080}.v.w1{color:#c8c830}.v.w2{color:#e08030}.v.w3{color:#e03030}.v.w4{color:#c030c0}
#chart-wrap{padding:8px 10px;border-bottom:1px solid #1a3348;flex-shrink:0;display:none}
#chart-wrap h4{font-size:10px;color:#3a6080;margin-bottom:4px}
#cv{display:block;width:100%;height:90px;background:#060f18;border-radius:3px}
#seg-tbl{padding:6px 10px;flex:1;overflow-y:auto;display:none}
#seg-tbl h4{font-size:10px;color:#3a6080;margin-bottom:5px}
.sr{display:grid;grid-template-columns:72px 1fr 44px;align-items:center;gap:4px;margin-bottom:4px;font-size:9px}
.sl2{color:#3a7090}.sbw{background:#050e18;border-radius:2px;height:6px;overflow:hidden}.sb2{height:100%;border-radius:2px}.sv{text-align:right;color:#9ab8d0}
#leg{padding:8px 10px;border-top:1px solid #1a3348;flex-shrink:0}
#leg h4{font-size:10px;color:#3a6080;margin-bottom:4px}
.li-wrap{display:flex;flex-direction:column;gap:2px}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:#5a8aaa}
.lsw{width:16px;height:10px;border-radius:1px;flex-shrink:0;border:1px solid rgba(255,255,255,.1)}
.dn{font-size:9px;color:#1e4060;padding:3px 10px;border-top:1px solid #1a3348}
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#091520;border:1px solid #2a5a8a;border-radius:8px;padding:20px 30px;font-size:13px;color:#6bc8e8;z-index:9999;text-align:center}
.leaflet-popup-content-wrapper{background:#091520!important;border:1px solid #2060a0!important;border-radius:5px!important;color:#b0d0f0!important;box-shadow:0 4px 16px rgba(0,0,0,.7)!important}
.leaflet-popup-tip{background:#091520!important}
.leaflet-popup-content{margin:8px 12px!important;font-size:11px!important;line-height:1.7}
</style>
</head>
<body>
<div id="loading">⏳ 載入地圖資料中...</div>
<div id="hdr">
  <div><h1>台灣降雨預測監測系統</h1><div class="sub">QPF × ETR2% · 水保署</div></div>
  <span class="tag agency">農業部水土保持署</span>
  <span class="tag sim" id="data-tag">⚑ 示範資料</span>
  <span class="tag time" id="base-tag"></span>
  <button class="b pbtn" id="btn-pause" onclick="togglePause()">⏸ 暫停更新</button>
</div>
<div id="ctrl">
  <div class="ctrl-row">
    <span class="cl">圖層</span>
    <div class="bg">
      <button class="b on" id="bRain"  onclick="setMode('rain')">累積雨量</button>
      <button class="b"    id="bEtr"   onclick="setMode('etr')">ETR2%</button>
      <button class="b"    id="bRiskA" onclick="setMode('riskA')">複合風險A</button>
      <button class="b"    id="bRiskB" onclick="setMode('riskB')">複合風險B</button>
    </div>
    <span class="cl" style="margin-left:6px">過去</span>
    <div class="bg">
      <button class="b" id="bP2d"   onclick="setWin('past2d')">過去2天</button>
      <button class="b" id="bP1d"   onclick="setWin('past1d')">過去1天</button>
      <button class="b on" id="bToday" onclick="setWin('today')">今天</button>
    </div>
    <span class="cl" style="margin-left:6px">未來（6h段）</span>
    <div class="bg">
      <button class="b" id="bN6"  onclick="setWin('n6h')">+6h</button>
      <button class="b" id="bN12" onclick="setWin('n12h')">+12h</button>
      <button class="b" id="bN24" onclick="setWin('n24h')">+24h</button>
      <button class="b"    id="bN48" onclick="setWin('n48h')">+48h</button>
    </div>
  </div>
  <div class="ctrl-row">
    <span class="cl">逐日</span>
    <div class="bg" id="day-btns"></div>
    <span class="cl" style="margin-left:6px">自訂</span>
    <button class="b" id="bCust" onclick="setWin('custom')">自訂範圍</button>
  </div>
  <div id="cust-ctrl">
    <div class="sl-wrap">
      <label>起始天</label>
      <input type="range" id="slS" min="1" max="15" value="1" oninput="onSlider()">
      <span id="slS-v" style="font-size:10px;color:#6bc8e8;width:18px">1</span>
    </div>
    <div class="sl-wrap">
      <label>結束天</label>
      <input type="range" id="slE" min="1" max="15" value="15" oninput="onSlider()">
      <span id="slE-v" style="font-size:10px;color:#6bc8e8;width:18px">15</span>
    </div>
    <span id="rng-disp"></span>
  </div>
</div>
<div id="main">
  <div id="map"></div>
  <div id="sb">
    <div id="ip">
      <h3 id="iTitle">點選鄉鎮查看詳情</h3>
      <div id="iCont" class="hint">在地圖點選任一區域，可查看累積雨量、ETR2% 及逐日趨勢。</div>
    </div>
    <div id="chart-wrap"><h4>逐日雨量（15天）</h4><canvas id="cv"></canvas></div>
    <div id="seg-tbl"><h4>6小時分段（前48h）</h4><div id="seg-rows"></div></div>
    <div id="leg"><h4 id="leg-title">累積雨量 (mm)</h4><div class="li-wrap" id="leg-items"></div></div>
    <div class="dn" id="data-note">資料來源：示範資料</div>
  </div>
</div>

//  色階
// ════════════════════════════════════════════════
const RAIN_SCALE=[
  {max:20,  color:'#87CEEB',label:'< 20 mm'},
  {max:40,  color:'#00CC44',label:'20–40 mm'},
  {max:70,  color:'#DDDD00',label:'40–70 mm'},
  {max:130, color:'#DD2222',label:'70–130 mm'},
  {max:250, color:'#9900CC',label:'130–250 mm'},
  {max:1e9, color:'#DDA0DD',label:'250+ mm'},
];
const ETR_SCALE=[
  {max:50,  color:'#FFFFFF',label:'< 50%'},
  {max:70,  color:'#00CC44',label:'50–70%'},
  {max:90,  color:'#DDDD00',label:'70–90%'},
  {max:100, color:'#DD2222',label:'90–100%'},
  {max:1e9, color:'#BB00BB',label:'≥ 100%'},
];
// 複合風險色階
const RISK_SCALE=[
  {max:40,  color:'#FFFFFF', label:'< 40%（低風險）'},
  {max:70,  color:'#DDDD00', label:'40–70%（中風險）'},
  {max:1e9, color:'#DD2222', label:'≥ 70%（高風險）'},
];
function rainColor(v){for(const s of RAIN_SCALE)if(v<s.max)return s.color;return'#DDA0DD'}
function etrColor(v) {for(const s of ETR_SCALE) if(v<s.max)return s.color;return'#BB00BB'}
function riskColor(v){for(const s of RISK_SCALE)if(v<s.max)return s.color;return'#DD2222'}
function wCls(v){return v>=100?'w4':v>=90?'w3':v>=70?'w2':v>=50?'w1':'ok'}
function riskCls(v){return v>=70?'w3':v>=40?'w1':'ok'}

// ════════════════════════════════════════════════
//  累積計算
//  模式：
//   past*  → 用觀測值（rain_24h/rain_6h）
//   today/n*h/nXXh → 用 QPF（qpf_15d）
//   day*   → 用 QPF（qpf_15d）
// ════════════════════════════════════════════════
function getAccum(t){
  // 無觀測資料的鄉鎮（etr2_pct===null）→ 回傳 null 讓地圖顯示白色
  const hasObs = t.rain_24h !== null && t.rain_24h !== undefined;

  // 複合風險模式：取對應 6h 時段的風險值
  if(mode==='riskA'||mode==='riskB'){
    const segIdx = Math.max(0, dayFrom*4);  // 取範圍起始時段
    const riskList = mode==='riskA' ? (t.risk_a||[]) : (t.risk_b||[]);
    const riskVal = riskList[segIdx] !== undefined ? riskList[segIdx] : null;
    return {totalRain: riskVal, etrPct: riskVal, isRisk: true};
  }

  // 過去時段：用觀測值
  if(dayFrom < 0 && dayTo <= 0){
    if(!hasObs) return {totalRain:null, etrPct:null};
    // 選取對應時距的觀測累積值
    const totalDays = Math.abs(dayFrom);  // 1=昨天, 2=前天...
    let totalRain;
    if(totalDays <= 1)      totalRain = t.rain_24h || 0;
    else if(totalDays <= 2) totalRain = t.rain_2d  || t.rain_24h || 0;
    else                    totalRain = t.rain_3d  || t.rain_2d  || t.rain_24h || 0;
    // 加上今天（如果 dayTo=0）
    if(dayTo === 0) totalRain = Math.round(((t.rain_24h||0) + totalRain)*10)/10;
    totalRain = Math.round(totalRain*10)/10;
    const days = Math.abs(dayFrom) + (dayTo>=0?1:0);
    const etrPct = t.alert_val > 0
      ? Math.round(totalRain / (t.alert_val * Math.max(1,days)) * 1000) / 10
      : null;
    return {totalRain, etrPct};
  }

  // 今天（dayFrom=0,dayTo=0）：優先用觀測值
  if(dayFrom === 0 && dayTo === 0 && hasObs){
    const totalRain = t.rain_24h || 0;
    const etrPct = (t.etr2_pct !== null && t.etr2_pct !== undefined)
      ? Math.round(t.etr2_pct * 1000) / 10
      : (t.alert_val > 0 ? Math.round(totalRain / t.alert_val * 1000) / 10 : null);
    return {totalRain, etrPct};
  }

  // 未來：用 QPF（qpf_15d）
  // 非颱風期 qpf_15d[0-7]=0，第3天後才有 Open-Meteo 資料
  const qpf = t.qpf_15d || [];
  let total = 0;
  for(let day = Math.max(0,dayFrom); day <= dayTo; day++){
    for(let i = day*4; i < day*4+4; i++) total += qpf[i]||0;
  }
  total = Math.round(total*10)/10;
  const days = dayTo - Math.max(0,dayFrom) + 1;
  const etrPct = t.alert_val > 0
    ? Math.round(total / (t.alert_val * days) * 1000) / 10
    : null;
  // 無QPF資料（全為0且非降雨期）→ 仍然顯示，不回傳null
  return {totalRain: total, etrPct};
}

// 取「現況 ETR2%」（觀測值，顯示在側欄）
function getObsEtr(t){
  if(t.etr2_pct === null || t.etr2_pct === undefined) return null;
  return Math.round(t.etr2_pct * 1000) / 10;  // 轉成 %
}

// ════════════════════════════════════════════════
//  渲染圖層
// ════════════════════════════════════════════════
function renderLayer(){
  if(townLayer){map.removeLayer(townLayer);townLayer=null;}
  if(countyLayer){map.removeLayer(countyLayer);countyLayer=null;}
  if(!TOWN_GEO||!COUNTY_GEO) return;

  const toLL = ring => ring.map(([lng,lat])=>[lat,lng]);

  // 鄉鎮層（淡細線）
  townLayer = L.layerGroup();
  TOWN_GEO.features.forEach(feat=>{
    const p = feat.properties;
    const t = TMAP[p.COUNTYNAME + p.TOWNNAME];
    const isSel = selected && selected.county===p.COUNTYNAME && selected.township===p.TOWNNAME;
    let fillColor='#e8eef2', fillOp=0.05;
    if(t){
      const {totalRain,etrPct} = getAccum(t);
      if(totalRain === null){
        fillColor='#ffffff'; fillOp=0.0;
      } else if(v.isRisk){
        fillColor = riskColor(totalRain);
        fillOp    = isSel?0.93:0.78;
      } else {
        fillColor = mode==='rain' ? rainColor(totalRain) : (etrPct===null?'#ffffff':etrColor(etrPct));
        fillOp    = isSel?0.93:0.78;
      }
    }
    const opts={color:isSel?'#ffff44':'rgba(60,80,100,0.4)', weight:isSel?1.5:0.4, fillColor, fillOpacity:fillOp};
    let poly;
    const g = feat.geometry;
    if(g.type==='Polygon'){
      poly=L.polygon(g.coordinates.map(toLL),opts);
    } else {
      poly=L.layerGroup(g.coordinates.map(part=>L.polygon(part.map(toLL),opts)));
    }
    if(t){
      const {totalRain,etrPct}=getAccum(t);
      const obsEtr2 = getObsEtr(t);
      const rainStr = totalRain !== null ? totalRain+' mm' : '—';
      const etrStr  = obsEtr2  !== null ? obsEtr2.toFixed(0)+'%' : '—';
      poly.bindTooltip(
        `<b>${p.COUNTYNAME} ${p.TOWNNAME}</b><br>QPF ${rainStr} &nbsp;ETR2% ${etrStr}`,
        {sticky:true,opacity:.92}
      );
      poly.on('click',()=>{selected=t;renderLayer();updateInfo(t);});
    }
    poly.addTo(townLayer);
  });
  townLayer.addTo(map);

  // 縣市邊界（黑色 1px）
  countyLayer = L.layerGroup();
  COUNTY_GEO.features.forEach(feat=>{
    const opts={color:'#000000',weight:1,fill:false,opacity:0.7,interactive:false};
    const g = feat.geometry;
    if(g.type==='Polygon'){
      L.polygon(g.coordinates.map(toLL),opts).addTo(countyLayer);
    } else {
      g.coordinates.forEach(part=>L.polygon(part.map(toLL),opts).addTo(countyLayer));
    }
  });
  countyLayer.addTo(map);
}

// ════════════════════════════════════════════════
//  側欄
// ════════════════════════════════════════════════
function wv(cls,txt){return`<span class="v ${cls}">${txt}</span>`;}
function updateInfo(t){
  document.getElementById('iTitle').textContent=`${t.county} ${t.township}`;
  const {totalRain,etrPct}=getAccum(t);
  const days=dayTo-dayFrom+1;
  const t0=new Date(BASE_TIME.getTime()+Math.max(0,dayFrom)*86400000);
  const t1=new Date(BASE_TIME.getTime()+(dayTo+1)*86400000);
  const obsEtr = getObsEtr(t);
  const hasObs = t.rain_24h !== null && t.rain_24h !== undefined;

  // 複合風險模式：取對應 6h 時段的風險值
  if(mode==='riskA'||mode==='riskB'){
    const segIdx = Math.max(0, dayFrom*4);  // 取範圍起始時段
    const riskList = mode==='riskA' ? (t.risk_a||[]) : (t.risk_b||[]);
    const riskVal = riskList[segIdx] !== undefined ? riskList[segIdx] : null;
    return {totalRain: riskVal, etrPct: riskVal, isRisk: true};
  }

  document.getElementById('iCont').innerHTML=`
    <div class="ir" style="background:#0d2535;margin:-2px -0px 4px;padding:3px 4px;border-radius:3px">
      <span class="l" style="color:#6bc8e8;font-weight:700">現況觀測</span>
    </div>
    <div class="ir"><span class="l">ETR2警戒值</span>${wv('', t.alert_val ? t.alert_val+' mm' : '—')}</div>
    <div class="ir"><span class="l">近24h累積雨量</span>${wv('', hasObs ? (t.rain_24h)+' mm' : '無資料')}</div>
    <div class="ir"><span class="l">有效累積(ETR2)</span>${wv('', t.etr2 !== null && t.etr2 !== undefined ? t.etr2+' mm' : '—')}</div>
    <div class="ir"><span class="l">現況ETR2%</span>${obsEtr!==null ? wv(wCls(obsEtr), obsEtr.toFixed(0)+'%') : wv('','—')}</div>
    <div class="ir" style="background:#0d2535;margin:4px -0px 4px;padding:3px 4px;border-radius:3px">
      <span class="l" style="color:#6bc8e8;font-weight:700">QPF預報（${fmtDay(t0)}→${fmtDay(t1)}，${days}天）</span>
    </div>
    <div class="ir"><span class="l">預測累積QPF</span>${wv('', totalRain !== null ? totalRain+' mm' : '—')}</div>
    <div class="ir"><span class="l">預測ETR2%</span>${etrPct!==null ? wv(wCls(etrPct), etrPct.toFixed(0)+'%') : wv('','—')}</div>
  `;
  // PoP 和複合風險
  const pop6h    = t.pop_6h    || [];
  const risk_a   = t.risk_a    || [];
  const risk_b   = t.risk_b    || [];
  const segIdx   = Math.max(0, dayFrom*4);
  const curPop   = pop6h[segIdx];
  const curRiskA = risk_a[segIdx];
  const curRiskB = risk_b[segIdx];

  const riskBlock = document.createElement('div');
  riskBlock.innerHTML = `
    <div class="ir" style="background:#1a2a10;margin:4px 0;padding:3px 4px;border-radius:3px">
      <span class="l" style="color:#8ad040;font-weight:700">複合風險指標（當前時段）</span>
    </div>
    <div class="ir"><span class="l">PoP降雨機率</span>${wv('', curPop!==null&&curPop!==undefined ? curPop.toFixed(0)+'%' : '—')}</div>
    <div class="ir"><span class="l">風險A（PoP×ETR2%）</span>${curRiskA!==null&&curRiskA!==undefined ? wv(riskCls(curRiskA), curRiskA.toFixed(0)+'%') : wv('','—')}</div>
    <div class="ir"><span class="l">風險B（PoP×複合）</span>${curRiskB!==null&&curRiskB!==undefined ? wv(riskCls(curRiskB), curRiskB.toFixed(0)+'%') : wv('','—')}</div>
  `;
  document.getElementById('iCont').appendChild(riskBlock);
  drawChart(t); drawSegs(t);
}

function drawChart(t){
  document.getElementById('chart-wrap').style.display='block';
  const cv=document.getElementById('cv');
  const W=cv.offsetWidth||240,H=90;
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const d=t.daily_qpf||[];if(!d.length)return;
  const mx=Math.max(...d,10);
  const pL=28,pR=6,pT=6,pB=18,cw=W-pL-pR,ch=H-pT-pB,xS=cw/(d.length-1);
  ctx.strokeStyle='#1a3a5a';ctx.lineWidth=0.4;
  [.25,.5,.75,1].forEach(r=>{const y=pT+ch*(1-r);ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke();ctx.fillStyle='#3a6080';ctx.font='7px sans-serif';ctx.textAlign='left';ctx.fillText(Math.round(mx*r),2,y+3);});
  const dF=Math.max(0,dayFrom),dT=Math.min(d.length-1,dayTo);
  if(dT>=dF){ctx.fillStyle='rgba(60,140,220,.18)';ctx.fillRect(pL+dF*xS,pT,(dT-dF+1)*xS,ch);}
  ctx.beginPath();ctx.strokeStyle='#4aaae8';ctx.lineWidth=1.5;
  d.forEach((v,i)=>{const x=pL+i*xS,y=pT+ch*(1-v/mx);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.stroke();
  d.forEach((v,i)=>{const x=pL+i*xS,y=pT+ch*(1-v/mx);ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fillStyle=(i>=dF&&i<=dT)?'#6af0ff':'#2a6090';ctx.fill();});
  ctx.fillStyle='#3a6080';ctx.font='7px sans-serif';ctx.textAlign='center';
  d.forEach((v,i)=>{if(i%3===0||i===d.length-1){const dt=new Date(BASE_TIME.getTime()+i*86400000);ctx.fillText(fmtDay(dt),pL+i*xS,H-2);}});
}

function drawSegs(t){
  document.getElementById('seg-tbl').style.display='block';
  const segs=(t.qpf_15d||[]).slice(0,8);
  const maxV=Math.max(...segs,1);
  document.getElementById('seg-rows').innerHTML=segs.map((v,i)=>{
    const ep=(t.seg_etr_pct||[])[i]||0;
    const col=mode==='rain'?rainColor(v):etrColor(ep);
    const bw=Math.round(v/maxV*100);
    const t0=new Date(BASE_TIME.getTime()+i*6*3600000);
    return`<div class="sr"><span class="sl2">${fmtDT(t0)}</span><div class="sbw"><div class="sb2" style="width:${bw}%;background:${col}"></div></div><span class="sv">${mode==='rain'?v+'mm':ep+'%'}</span></div>`;
  }).join('');
}

function renderLegend(){
  const sc = mode==='rain'?RAIN_SCALE : mode==='etr'?ETR_SCALE : RISK_SCALE;
  const days=dayTo-dayFrom+1;
  const titles = {rain:`累積雨量(mm)・${days}天`, etr:`ETR2%・${days}天`,
                  riskA:'複合風險A（PoP×ETR2%）', riskB:'複合風險B（PoP×(ETR2+QPF)/警戒值）'};
  document.getElementById('leg-title').textContent = titles[mode] || '';
  document.getElementById('leg-items').innerHTML=sc.map(s=>`<div class="li"><div class="lsw" style="background:${s.color}"></div>${s.label}</div>`).join('');
}

// ════════════════════════════════════════════════
//  暫停
// ════════════════════════════════════════════════
function togglePause(){
  isPaused=!isPaused;
  const btn=document.getElementById('btn-pause');
  btn.classList.toggle('on',isPaused);
  btn.textContent=isPaused?'▶ 繼續更新':'⏸ 暫停更新';
  document.getElementById('data-tag').classList.toggle('paused',isPaused);
  if(!isPaused) tryLoadLive();
}

// ════════════════════════════════════════════════
//  載入即時資料
// ════════════════════════════════════════════════
async function tryLoadLive(){
  if(isPaused) return;
  try{
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok) throw new Error('no data.json');
    const d=await r.json();
    if(d.townships) d.townships.forEach(t=>{
      const f=TOWNSHIPS.find(x=>x.county===t.county&&x.township===t.township);
      if(f) Object.assign(f,t);
    });
    BASE_TIME=new Date(d.base_time);
    document.getElementById('data-tag').className='tag live';
    document.getElementById('data-tag').textContent='● 即時資料';
    document.getElementById('data-note').textContent=`CWA QPF(前48h)+GFS(3-15天)・${d.generated_at?d.generated_at.slice(0,16).replace('T',' '):''}`;
  }catch(e){
    document.getElementById('data-tag').className='tag sim';
    document.getElementById('data-tag').textContent='⚑ 示範資料';
  }
  document.getElementById('base-tag').textContent=`基準：${fmtDT(BASE_TIME)}`;
  buildDayBtns();
  renderLayer();
  renderLegend();
  if(selected) updateInfo(selected);
}

// ════════════════════════════════════════════════
//  時間控制
// ════════════════════════════════════════════════
const ALL_BTNS=['bP2d','bP1d','bToday','bN6','bN12','bN24','bN48','bCust'];
function clearBtns(){
  ALL_BTNS.forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('on');});
  document.querySelectorAll('#day-btns .b').forEach(b=>b.classList.remove('on'));
}
function setMode(m){
  mode=m;
  ['bRain','bEtr','bRiskA','bRiskB'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.remove('on');
  });
  const modeMap={rain:'bRain',etr:'bEtr',riskA:'bRiskA',riskB:'bRiskB'};
  const el=document.getElementById(modeMap[m]);
  if(el) el.classList.add('on');
  renderLayer();renderLegend();if(selected)updateInfo(selected);
}
function setWin(key){
  winKey=key; clearBtns();
  document.getElementById('cust-ctrl').classList.remove('show');
  if(key==='custom'){document.getElementById('bCust').classList.add('on');document.getElementById('cust-ctrl').classList.add('show');onSlider();return;}
  if(key.startsWith('day')){
    const di=parseInt(key.slice(3))-1; dayFrom=di;dayTo=di;
    const el=document.getElementById('b'+key);if(el)el.classList.add('on');
  } else {
    const pm={'past2d':[-2,-1],'past1d':[-1,-1],'today':[0,0],'n6h':[0,0],'n12h':[0,0],'n24h':[0,0],'n48h':[0,1]};
    const bm={'past2d':'bP2d','past1d':'bP1d','today':'bToday','n6h':'bN6','n12h':'bN12','n24h':'bN24','n48h':'bN48'};
    if(pm[key]){[dayFrom,dayTo]=pm[key];}
    const el=document.getElementById(bm[key]);if(el)el.classList.add('on');
  }
  renderLayer();renderLegend();if(selected)updateInfo(selected);
}
function onSlider(){
  let s=+document.getElementById('slS').value;
  let e=+document.getElementById('slE').value;
  if(e<s){e=s;document.getElementById('slE').value=e;}
  document.getElementById('slS-v').textContent=s;
  document.getElementById('slE-v').textContent=e;
  dayFrom=s-1;dayTo=e-1;
  const t0=new Date(BASE_TIME.getTime()+dayFrom*86400000);
  const t1=new Date(BASE_TIME.getTime()+(dayTo+1)*86400000);
  document.getElementById('rng-disp').textContent=`第${s}天(${fmtDay(t0)})→第${e}天(${fmtDay(t1)})，共${e-s+1}天`;
  renderLayer();renderLegend();if(selected)updateInfo(selected);
}
function buildDayBtns(){
  const c=document.getElementById('day-btns');c.innerHTML='';
  for(let i=1;i<=15;i++){
    const dt=new Date(BASE_TIME.getTime()+(i-1)*86400000);
    const btn=document.createElement('button');
    btn.className='b';btn.id=`bday${i}`;btn.textContent=fmtDay(dt);
    btn.onclick=(d=>()=>setWin('day'+d))(i);
    c.appendChild(btn);
  }
}

// ════════════════════════════════════════════════
//  啟動：先載入兩個 GeoJSON，再初始化地圖
// ════════════════════════════════════════════════
async function init(){
  try{
    const [tr, cr] = await Promise.all([
      fetch('town_moi.geojson'),
      fetch('county_moi.geojson')
    ]);
    TOWN_GEO   = await tr.json();
    COUNTY_GEO = await cr.json();
  } catch(e){
    document.getElementById('loading').textContent = '⚠ 請用本機伺服器開啟（見說明）';
    return;
  }
  document.getElementById('loading').style.display='none';
  buildDayBtns();
  setWin('n48h');
  tryLoadLive();
  setInterval(()=>{if(!isPaused)tryLoadLive();}, 30*60*1000);
}
init();
</script>
